monitor_task:
  description: >
    You will receive:
      - agent_name
      - checks_json (pass/fail of required checks)
      - error (if any)
      - output_preview (truncated output)

    Decide whether the output should PASS or FAIL. If any check in checks_json
    is false or error is present, return status FAIL. Otherwise return PASS.

    Output ONLY JSON with a status field (PASS or FAIL) and a notes array.
  expected_output: >
    A JSON object with status set to PASS or FAIL, plus a notes array.
  agent: supervisor
  cache: false
