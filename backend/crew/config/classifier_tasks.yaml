classify_posts_task:
  description: >
    Classify the provided list of civic posts from the scraper output.

    Input variable:
    - posts_json: JSON array of post objects

    Use the CivicClassifyTool with the posts_json input. Return ONLY the
    resulting JSON array from the tool with fields:
    title, description, link, pub_date, source, scraped_at,
    label, confidence, language, needs_review.
    Do not call any external tools or web search (including brave_search).
  expected_output: >
    A JSON array of posts with classification metadata fields: title,
    description, link, pub_date, source, label, confidence, language,
    needs_review.
  agent: civic_classifier
  cache: false
