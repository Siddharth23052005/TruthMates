validate_output_task:
  description: >
    You will receive posts_json with counter-info outputs and evidence.
    The full JSON payload is:
    {posts_json}

    Validation checks required for EACH post:
    1) Contradiction with any retrieved PIB fact (flag if counter_english
       contradicts any match.fact_text from source_type "pinecone").
    2) All cited source URLs are real and reachable. Use UrlCheckTool with the
       list of sources for the post.
    3) Trust score matches verdict logically. Use rules:
       - Respect verdict_hint when it is provided unless the post's own evidence
         clearly contradicts it.
       - If verification_label is "source_unavailable", verdict should be INSUFFICIENT_EVIDENCE.
       - If misleading_reason is present and supported by the evidence, verdict should be MISLEADING.
       - If strong evidence supports the claim from trusted sources, verdict should be SUPPORTED.
       - If strong evidence contradicts the claim from trusted sources, verdict should be REFUTED.
       - If evidence is weak or mixed, verdict should be UNVERIFIED.
       Flag mismatch if verdict conflicts with trust_score label:
         SUPPORTED -> 71-100 (Green)
         REFUTED -> 41-70 (Yellow) or lower if evidence is weak
         MISLEADING -> 41-70 (Yellow)
         UNVERIFIED or INSUFFICIENT_EVIDENCE -> 41-70 (Yellow)
    4) Hindi translation must be present (non-empty).
    5) Hallucinated statistics: flag if counter_english includes numbers or
       statistics not supported by any match.fact_text.
    6) Overly hedged language: flag if counter_english uses stiff phrases like
       "it should be noted", "based on the available information",
       "cannot be definitively concluded", or "appears to suggest".

    Output MUST be JSON with a top-level object containing an items array.
    Each item must include: link, verdict, and flags (contradicts_pib_fact,
    invalid_source_url, trust_score_mismatch, missing_hindi, hallucinated_stats,
    overly_hedged_language).

    Do not call any external tools or web search (including brave_search).
  expected_output: >
    A JSON object with an items array. Each item includes link, verdict, and
    flags (contradicts_pib_fact, invalid_source_url, trust_score_mismatch,
    missing_hindi, hallucinated_stats, overly_hedged_language).
  agent: output_validator
  cache: false
